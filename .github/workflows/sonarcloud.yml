name: SonarCloud

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Configure SonarCloud environment
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          repo="${{ github.event.repository.name }}"
          if [ -n "${{ vars.SONAR_ORGANIZATION }}" ]; then
            echo "SONAR_ORGANIZATION=${{ vars.SONAR_ORGANIZATION }}" >> "$GITHUB_ENV"
          else
            echo "SONAR_ORGANIZATION=${owner}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.SONAR_PROJECT_KEY }}" ]; then
            echo "SONAR_PROJECT_KEY=${{ vars.SONAR_PROJECT_KEY }}" >> "$GITHUB_ENV"
          else
            echo "SONAR_PROJECT_KEY=${owner}_${repo}" >> "$GITHUB_ENV"
          fi

      - name: Run tests and SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew test jacocoTestReport sonar
