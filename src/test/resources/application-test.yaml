spring:
  application:
    name: devsecops-test

  main:
    banner-mode: off

  datasource:
    # JDBC URL, username, and password come from Testcontainers at runtime.
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway connection settings are overridden by Testcontainers at runtime.

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: false

logging:
  level:
    com.demo.devsecops: INFO
    org.hibernate.SQL: WARN
    org.testcontainers: INFO
